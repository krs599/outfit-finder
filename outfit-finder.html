<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Outfit Finder">
  <title>Outfit Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #110e0a; color: #e8dcc8; font-family: 'Lato', sans-serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1a1510; }
    ::-webkit-scrollbar-thumb { background: #3a3020; border-radius: 2px; }

    #header {
      border-bottom: 1px solid rgba(200,168,82,0.15);
      padding: max(28px, env(safe-area-inset-top, 28px)) 20px 18px;
      background: linear-gradient(180deg, #1a1410 0%, #110e0a 100%);
      position: sticky; top: 0; z-index: 10;
    }
    #header .sub { font-size: 10px; letter-spacing: 0.2em; color: #6a5f4e; text-transform: uppercase; margin-bottom: 4px; }
    #header h1 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: #e8dcc8; line-height: 1.1; margin-bottom: 4px; }
    #header .count { font-size: 12px; color: #5a5040; }

    #main { max-width: 720px; margin: 0 auto; padding: 16px 14px max(24px, env(safe-area-inset-bottom, 24px)); }

    .section-label { font-size: 10px; letter-spacing: 0.15em; color: #5a5040; text-transform: uppercase; margin-bottom: 8px; }

    .chips-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 18px; }
    .chip {
      padding: 7px 14px; border-radius: 24px;
      border: 1.5px solid #2e2820; background: transparent;
      color: #7a6f5e; font-size: 13px; font-family: 'Lato', sans-serif;
      letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s;
      white-space: nowrap; -webkit-appearance: none;
    }
    .chip.active { border-color: #c8a852; background: rgba(200,168,82,0.15); color: #c8a852; }

    .filter-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .reset-btn { background: none; border: none; color: #7a6f5e; font-size: 12px; cursor: pointer; letter-spacing: 0.05em; font-family: 'Lato', sans-serif; }

    .filter-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .filter-btn {
      padding: 8px 14px; border-radius: 8px;
      border: 1.5px solid #2e2820; background: #1a1510;
      color: #6a5f4e; font-size: 13px; cursor: pointer;
      font-family: 'Lato', sans-serif; display: flex; align-items: center; gap: 6px;
      transition: all 0.2s; -webkit-appearance: none;
    }
    .filter-btn.open { border-color: #c8a852; background: rgba(200,168,82,0.12); color: #c8a852; }
    .filter-btn.set { border-color: rgba(200,168,82,0.4); background: rgba(200,168,82,0.06); color: #a89060; }

    .dropdown {
      background: #1a1510; border: 1px solid #2e2820;
      border-radius: 10px; padding: 12px 12px;
      margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 7px;
      animation: fadeUp 0.15s ease both;
    }

    .active-summary {
      background: rgba(200,168,82,0.06); border: 1px solid rgba(200,168,82,0.15);
      border-radius: 8px; padding: 9px 12px; margin-bottom: 14px;
      font-size: 12px; color: #9a8e7c;
    }
    .active-summary strong { color: #c8a852; }

    .cards { display: flex; flex-direction: column; gap: 11px; }

    .card {
      border-radius: 12px; padding: 16px 16px; position: relative;
      display: flex; flex-direction: column; gap: 9px;
      animation: fadeUp 0.3s ease both;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .card.gold { border-color: rgba(212,175,55,0.3); background: rgba(212,175,55,0.12); }
    .card.silver { background: rgba(200,168,82,0.10); }
    .card.bronze { background: rgba(160,149,110,0.10); }
    .card.base { background: rgba(139,128,112,0.08); }

    .top-badge {
      position: absolute; top: -1px; right: 14px;
      background: #d4af37; color: #1a1209;
      font-size: 9px; font-weight: 800; letter-spacing: 0.12em;
      padding: 3px 9px; border-radius: 0 0 6px 6px;
      font-family: 'Lato', sans-serif;
    }

    .card-meta { display: flex; justify-content: space-between; align-items: center; }
    .card-rank { font-size: 10px; color: #5a5040; letter-spacing: 0.1em; text-transform: uppercase; }
    .card-anlass { font-size: 11px; color: #7a6f5e; text-align: right; max-width: 55%; }

    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 7px; padding: 4px 9px; font-size: 11px; color: #c8bba8;
    }

    .rating-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .rating-track { flex: 1; height: 4px; background: #2a2420; border-radius: 2px; overflow: hidden; }
    .rating-fill { height: 100%; border-radius: 2px; }
    .rating-label { font-size: 13px; font-weight: 700; min-width: 40px; font-family: 'Cormorant Garamond', serif; }

    .kommentar {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 13px; color: #9a8e7c; line-height: 1.5;
      border-left: 2px solid rgba(200,168,82,0.25); padding-left: 10px;
    }

    .empty { text-align: center; padding: 60px 0; color: #4a4030; }
    .empty .icon { font-size: 38px; margin-bottom: 10px; }
    .empty p { font-family: 'Cormorant Garamond', serif; font-size: 17px; margin-bottom: 12px; }
    .empty button {
      padding: 8px 20px; border-radius: 20px;
      border: 1px solid #3a3020; background: transparent;
      color: #7a6f5e; cursor: pointer; font-size: 13px;
      font-family: 'Lato', sans-serif;
    }

    .footer { text-align: center; margin-top: 28px; font-size: 10px; color: #3a3020; letter-spacing: 0.1em; }
  </style>
</head>
<body>

<div id="header">
  <div class="sub">Wardrobe Intelligence</div>
  <h1>Outfit Finder</h1>
  <div class="count" id="count-text"></div>
</div>

<div id="main">
  <!-- Kategorie -->
  <div class="section-label">Kategorie</div>
  <div class="chips-row" id="kategorie-chips"></div>

  <!-- Filter -->
  <div class="filter-header">
    <div class="section-label" style="margin:0">Filter</div>
    <button class="reset-btn" id="reset-btn" style="display:none">✕ Zurücksetzen</button>
  </div>
  <div class="filter-btns" id="filter-btns"></div>
  <div id="dropdown-container"></div>
  <div id="active-summary"></div>

  <!-- Cards -->
  <div class="cards" id="cards"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="icon">🧥</div>
    <p>Keine Kombinationen gefunden</p>
    <button onclick="resetAll()">Filter zurücksetzen</button>
  </div>

  <div class="footer" id="footer-text"></div>
</div>

<script>
const outfits = [
  { id:1, oberteil:"Petrol Polo", hose:"Beige Hose", schuh:"Heller BOSS Loafer", jacke:"Braune Lederjacke", bewertung:9.0, anlass:"Sommer Casual Chic", kommentar:"Das Petrol wirkt modern und hochwertig mit Beige.", kategorie:"Polo" },
  { id:2, oberteil:"Türkises Polo", hose:"Hellblaue Hose", schuh:"Heller BOSS Loafer", jacke:null, bewertung:8.5, anlass:"Urlaub, Tageslook", kommentar:"Sehr frischer Sommerlook mit mediterranem Feeling.", kategorie:"Polo" },
  { id:3, oberteil:"Blaues Lacoste Polo", hose:"Schwarze Hose", schuh:"Taupe BOSS Loafer", jacke:"Graue Lederjacke", bewertung:8.5, anlass:"Smart Casual", kommentar:"Der Kontrast macht das Outfit sportlich-elegant.", kategorie:"Polo" },
  { id:4, oberteil:"Gestreiftes T-Shirt", hose:"Hellblaue Hose", schuh:"DC Weiße Sneaker", jacke:"Graue Lederjacke", bewertung:8.0, anlass:"Alltag, Reisen", kommentar:"Clean und entspannt ohne overdressed zu wirken.", kategorie:"Shirt" },
  { id:5, oberteil:"Weißes Leinenhemd", hose:"Beige Hose", schuh:"Heller BOSS Loafer", jacke:"Braune Lederjacke", bewertung:10.0, anlass:"Date, Dinner, Sommerabend", kommentar:"Dein stärkster Quiet-Luxury-Look.", kategorie:"Hemd" },
  { id:6, oberteil:"Schwarzes Leinenhemd", hose:"Schwarze Hose", schuh:"Taupe BOSS Loafer", jacke:"Rote Lederjacke", bewertung:9.5, anlass:"Abend, Rooftop", kommentar:"Elegant und modern mit schönem Kontrast.", kategorie:"Hemd" },
  { id:7, oberteil:"Olive Hemd", hose:"Hellblaue Hose", schuh:"Heller BOSS Loafer", jacke:"Braune Lederjacke", bewertung:9.0, anlass:"Sommer, Urlaub", kommentar:"Sehr harmonische Naturfarben.", kategorie:"Hemd" },
  { id:8, oberteil:"Hellblaues Hemd", hose:"Beige Hose", schuh:"Heller BOSS Loafer", jacke:"Graue Lederjacke", bewertung:9.5, anlass:"Sommer Event", kommentar:"Sehr stilvoll und frisch.", kategorie:"Hemd" },
  { id:9, oberteil:"Weißes Leinenhemd", hose:"Beige Hose", schuh:"Heller BOSS Loafer", jacke:"Braune Lederjacke", bewertung:10.0, anlass:"Dinner, Date, Sommerabend", kommentar:"Sehr luxuriöser Riviera-/Italian-Summer-Look.", kategorie:"Hemd" },
  { id:10, oberteil:"Hellblaues Hemd", hose:"Hellblaue Hose", schuh:"Heller BOSS Loafer", jacke:"Braune Lederjacke", bewertung:9.5, anlass:"Sommer Event, Urlaub", kommentar:"Frisch und hochwertig mit mediterraner Wirkung.", kategorie:"Hemd" },
  { id:11, oberteil:"Weißes Leinenhemd", hose:"Beige Hose", schuh:"Heller BOSS Loafer", jacke:"Grau-grüne Lederjacke", bewertung:9.5, anlass:"Smart Casual, Abend", kommentar:"Die Jacke bringt Tiefe ohne den cleanen Stil zu zerstören.", kategorie:"Hemd" },
  { id:12, oberteil:"Olive Hemd", hose:"Beige Hose", schuh:"Taupe BOSS Loafer", jacke:"Grau-grüne Lederjacke", bewertung:9.0, anlass:"Casual Chic", kommentar:"Sehr harmonische Naturtöne und maskuliner Look.", kategorie:"Hemd" },
  { id:13, oberteil:"Gestreiftes Shirt", hose:"Schwarze Hose", schuh:"DC Weiße Sneaker", jacke:"Grau-grüne Lederjacke", bewertung:8.5, anlass:"Alltag, Reisen", kommentar:"Modern und entspannt mit cleaner Streetwear-Energie.", kategorie:"Shirt" },
  { id:14, oberteil:"Schwarzes Hemd", hose:"Schwarze Hose", schuh:"Taupe BOSS Loafer", jacke:"Rote Lederjacke", bewertung:9.0, anlass:"Abend, Bar, Event", kommentar:"Die rote Jacke wird zum Statement-Piece.", kategorie:"Hemd" },
  { id:15, oberteil:"Lacoste Türkis Polo", hose:"Beige Hose", schuh:"Heller BOSS Loafer", jacke:null, bewertung:9.5, anlass:"Sommer Dinner / Urlaub", kommentar:"Mediterraner Luxus-Look mit sehr harmonischen Farben.", kategorie:"Polo" },
  { id:16, oberteil:"Lacoste Türkis Polo", hose:"Weiße Hose", schuh:"Taupe BOSS Loafer", jacke:null, bewertung:9.0, anlass:"Beach Club / Resort", kommentar:"Frischer Yacht-Style mit hochwertigen Kontrasten.", kategorie:"Polo" },
  { id:17, oberteil:"Tommy Türkis Polo", hose:"Beige Hose", schuh:"Taupe BOSS Loafer", jacke:null, bewertung:10.0, anlass:"Date / Sommerabend", kommentar:"Sehr elegante und luxuriöse Farbkombination.", kategorie:"Polo" },
  { id:18, oberteil:"Tommy Dunkelpetrol Polo", hose:"Beige Hose", schuh:"Heller BOSS Loafer", jacke:null, bewertung:10.0, anlass:"Smart Casual / Dinner", kommentar:"Extrem hochwertiger Farbkontrast.", kategorie:"Polo" },
  { id:19, oberteil:"Tommy Dunkelpetrol Polo", hose:"Schwarze Hose", schuh:"Taupe BOSS Loafer", jacke:null, bewertung:9.5, anlass:"Abendlook", kommentar:"Modern und elegant zugleich.", kategorie:"Polo" },
  { id:20, oberteil:"Gestreiftes Shirt", hose:"Beige Hose", schuh:"Heller BOSS Loafer", jacke:null, bewertung:8.5, anlass:"Casual Sommer", kommentar:"Clean und ruhig, typisch Riviera Stil.", kategorie:"Shirt" },
  { id:21, oberteil:"Tommy Dunkelpetrol Polo", hose:"Schwarze Hose", schuh:"DC Weiße Sneaker", jacke:"Grau-grüne Lederjacke", bewertung:10.0, anlass:"Abend / Bar / City", kommentar:"Sehr moderne Designer-Vibes.", kategorie:"Polo" },
  { id:22, oberteil:"Gestreiftes Shirt", hose:"Hellblaue Hose", schuh:"DC Weiße Sneaker", jacke:null, bewertung:9.0, anlass:"Casual Alltag", kommentar:"Clean und moderner Summer Casual Look.", kategorie:"Shirt" },
  { id:23, oberteil:"Tommy Dunkelpetrol Polo", hose:"Schwarze Hose", schuh:"DC Weiße Sneaker", jacke:null, bewertung:9.5, anlass:"City / Abend", kommentar:"Moderner minimalistischer Street-Luxury Stil.", kategorie:"Polo" },
  { id:24, oberteil:"Lacoste Türkis Polo", hose:"Beige Hose", schuh:"DC Weiße Sneaker", jacke:null, bewertung:9.0, anlass:"Sommer / Urlaub", kommentar:"Frischer mediterraner Look.", kategorie:"Polo" },
  { id:25, oberteil:"Weißes Hemd", hose:"Beige Hose", schuh:"Hilfiger Beige Loafer", jacke:null, bewertung:10.0, anlass:"Sommer Dinner", kommentar:"Sehr luxuriöser Riviera-Look.", kategorie:"Hemd" },
  { id:26, oberteil:"Tommy Türkis Polo", hose:"Hellblaue Hose", schuh:"Hilfiger Beige Loafer", jacke:null, bewertung:9.0, anlass:"Smart Casual", kommentar:"Helle harmonische Sommerfarben.", kategorie:"Polo" },
  { id:27, oberteil:"Tommy Dunkelpetrol Polo", hose:"Beige Hose", schuh:"Hilfiger Beige Loafer", jacke:null, bewertung:10.0, anlass:"Date / Dinner", kommentar:"Sehr hochwertiger Kontrast.", kategorie:"Polo" },
  { id:28, oberteil:"Weißes Shirt", hose:"Beige Hose", schuh:"Hilfiger Beige Loafer", jacke:"Braune Lederjacke", bewertung:9.5, anlass:"Abend / Bar", kommentar:"Maskulin und elegant zugleich.", kategorie:"Shirt" },
  { id:29, oberteil:"Weißes Hemd", hose:"Hellgrau Karierte Hose", schuh:"Heller BOSS Loafer", jacke:null, bewertung:9.5, anlass:"Business Casual, Dinner", kommentar:"Sehr eleganter Sommerlook mit hochwertiger Wirkung.", kategorie:"Hemd" },
];

const FILTERS = [
  { label:"Schuh", key:"schuh", emoji:"👟" },
  { label:"Oberteil", key:"oberteil", emoji:"👕" },
  { label:"Hose", key:"hose", emoji:"👖" },
  { label:"Jacke", key:"jacke", emoji:"🧥" },
];
const KATEGORIEN = ["Alle","Hemd","Polo","Shirt"];

let state = { filters: { schuh:null, oberteil:null, hose:null, jacke:null }, kategorie:"Alle", activeTab:null };

function uniqueValues(key) {
  return [...new Set(outfits.map(o => o[key]).filter(Boolean))].sort();
}

function ratingColor(r) {
  if (r >= 10) return "#d4af37";
  if (r >= 9.5) return "#c8a852";
  if (r >= 9) return "#a0956e";
  if (r >= 8.5) return "#8a8070";
  return "#6b6b6b";
}

function cardClass(r) {
  if (r >= 10) return "card gold";
  if (r >= 9.5) return "card silver";
  if (r >= 9) return "card bronze";
  return "card base";
}

function getResults() {
  let list = outfits;
  if (state.kategorie !== "Alle") list = list.filter(o => o.kategorie === state.kategorie);
  if (state.filters.schuh) list = list.filter(o => o.schuh === state.filters.schuh);
  if (state.filters.oberteil) list = list.filter(o => o.oberteil === state.filters.oberteil);
  if (state.filters.hose) list = list.filter(o => o.hose === state.filters.hose);
  if (state.filters.jacke) list = list.filter(o => o.jacke === state.filters.jacke);
  return [...list].sort((a,b) => b.bewertung - a.bewertung);
}

function resetAll() {
  state.filters = { schuh:null, oberteil:null, hose:null, jacke:null };
  state.kategorie = "Alle";
  state.activeTab = null;
  render();
}

function render() {
  const results = getResults();
  const activeCount = Object.values(state.filters).filter(Boolean).length;

  // Count
  document.getElementById('count-text').textContent =
    results.length + ' Kombination' + (results.length !== 1 ? 'en' : '') + ' · nach Bewertung sortiert';

  // Footer
  document.getElementById('footer-text').textContent = outfits.length + ' OUTFITS · NACH BEWERTUNG SORTIERT';

  // Kategorie chips
  const katEl = document.getElementById('kategorie-chips');
  katEl.innerHTML = '';
  KATEGORIEN.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (state.kategorie === k ? ' active' : '');
    btn.textContent = k;
    btn.onclick = () => { state.kategorie = k; render(); };
    katEl.appendChild(btn);
  });

  // Reset button
  const resetBtn = document.getElementById('reset-btn');
  resetBtn.style.display = activeCount > 0 ? '' : 'none';
  resetBtn.textContent = '✕ Zurücksetzen (' + activeCount + ')';
  resetBtn.onclick = resetAll;

  // Filter buttons
  const filterBtns = document.getElementById('filter-btns');
  filterBtns.innerHTML = '';
  FILTERS.forEach(f => {
    const btn = document.createElement('button');
    const isOpen = state.activeTab === f.key;
    const isSet = !!state.filters[f.key];
    btn.className = 'filter-btn' + (isOpen ? ' open' : isSet ? ' set' : '');
    btn.innerHTML = '<span>' + f.emoji + '</span><span>' + (state.filters[f.key] || f.label) + '</span>' + (isSet ? '<span style="font-size:10px;opacity:0.7">▾</span>' : '');
    btn.onclick = () => {
      state.activeTab = state.activeTab === f.key ? null : f.key;
      render();
    };
    filterBtns.appendChild(btn);
  });

  // Dropdown
  const ddContainer = document.getElementById('dropdown-container');
  ddContainer.innerHTML = '';
  if (state.activeTab) {
    const dd = document.createElement('div');
    dd.className = 'dropdown';
    uniqueValues(state.activeTab).forEach(v => {
      const chip = document.createElement('button');
      chip.className = 'chip' + (state.filters[state.activeTab] === v ? ' active' : '');
      chip.textContent = v;
      chip.onclick = () => {
        state.filters[state.activeTab] = state.filters[state.activeTab] === v ? null : v;
        state.activeTab = null;
        render();
      };
      dd.appendChild(chip);
    });
    ddContainer.appendChild(dd);
  }

  // Active summary
  const summaryEl = document.getElementById('active-summary');
  if (activeCount > 0) {
    let html = '<div class="active-summary">';
    Object.entries(state.filters).filter(([,v]) => v).forEach(([k,v]) => {
      const f = FILTERS.find(f => f.key === k);
      html += f.emoji + ' <strong>' + v + '</strong>&nbsp;&nbsp;';
    });
    html += '</div>';
    summaryEl.innerHTML = html;
  } else {
    summaryEl.innerHTML = '';
  }

  // Cards
  const cardsEl = document.getElementById('cards');
  const emptyEl = document.getElementById('empty');

  if (results.length === 0) {
    cardsEl.innerHTML = '';
    emptyEl.style.display = '';
  } else {
    emptyEl.style.display = 'none';
    cardsEl.innerHTML = '';
    results.forEach((outfit, i) => {
      const card = document.createElement('div');
      card.className = cardClass(outfit.bewertung);
      card.style.animationDelay = (i * 0.04) + 's';

      const pct = Math.round(((outfit.bewertung - 7) / 3) * 100);
      const col = ratingColor(outfit.bewertung);

      const tags = [
        { emoji:'👕', val: outfit.oberteil },
        { emoji:'👖', val: outfit.hose },
        { emoji:'👟', val: outfit.schuh },
      ];
      if (outfit.jacke) tags.push({ emoji:'🧥', val: outfit.jacke });

      card.innerHTML =
        (outfit.bewertung >= 10 ? '<div class="top-badge">TOP OUTFIT</div>' : '') +
        '<div class="card-meta">' +
          '<span class="card-rank">#' + (i+1) + ' · ' + outfit.kategorie + '</span>' +
          '<span class="card-anlass">' + outfit.anlass + '</span>' +
        '</div>' +
        '<div class="tags">' +
          tags.map(t => '<span class="tag">' + t.emoji + ' ' + t.val + '</span>').join('') +
        '</div>' +
        '<div class="rating-bar-wrap">' +
          '<div class="rating-track"><div class="rating-fill" style="width:' + pct + '%;background:' + col + '"></div></div>' +
          '<span class="rating-label" style="color:' + col + '">' + outfit.bewertung.toFixed(1) + '/10</span>' +
        '</div>' +
        '<div class="kommentar">' + outfit.kommentar + '</div>';

      cardsEl.appendChild(card);
    });
  }
}

render();
</script>
</body>
</html>
